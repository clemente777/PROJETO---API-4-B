<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pizzaria dos Manos</title>

<style>
:root{
    --primary:#11411c;
    --primary-dark:#fa0f23;
    --card:#ffffff;
    --text:#2b2b2b;
    --muted:#6b7280;
    --success:#22c55e;
    --warning:#f59e0b;
    --danger:#ef4444;
    --shadow:0 18px 40px rgba(0,0,0,.25);
}

*{ box-sizing:border-box; }

body{
    margin:0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background:linear-gradient(180deg,#fff7f3,#fff0e8);
    color:var(--text);
}

/* ===== HEADER LIMPO ===== */
header{
    padding:40px 20px;
    display:flex;
    justify-content:center;
}

/* ===== BLOCO CENTRAL COM FUNDO LARANJA ===== */
.header-box{
    background:linear-gradient(360deg,var(--primary),var(--primary-dark));
    display:flex;
    align-items:center;
    gap:40px;
    padding:30px 50px;
    border-radius:32px;
    box-shadow:var(--shadow);
}

/* LOGO GRANDE */
.logo{
    width:500px;
    height:auto;
    border-radius:22px;
    background:white;
    padding:12px;
    box-shadow:0 12px 30px rgba(0,0,0,.35);
}

/* TÍTULO */
.header-text h1{
    margin:0;
    font-size:3.6rem;
    font-weight:900;
    color:#fff;
    letter-spacing:1px;
    text-shadow:3px 3px 8px rgba(0,0,0,.35);
    line-height:1.1;
}

.header-text span{
    display:block;
    font-size:1.15rem;
    font-weight:500;
    opacity:.9;
    margin-top:10px;
    color:#fff;
}

/* ===== CONTAINER ===== */
.container{
    width:90%;
    max-width:1100px;
    margin:50px auto;
}

/* FORM */
form{
    background:var(--card);
    padding:32px;
    border-radius:24px;
    box-shadow:0 14px 35px rgba(0,0,0,.15);
    margin-bottom:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
}

form input, form select{
    padding:14px 16px;
    border-radius:14px;
    border:1px solid #e5e7eb;
    font-size:1rem;
}

form button{
    grid-column:1/-1;
    padding:16px;
    border-radius:18px;
    font-size:1.1rem;
    font-weight:700;
}

/* BOTÕES */
button{
    border:none;
    cursor:pointer;
    background:var(--primary);
    color:white;
    transition:.25s;
}

button:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
}

/* FEEDBACK */
.loading{ color:var(--primary-dark); font-weight:600; }
.erro{ background:#ffe4e6; color:var(--danger); padding:14px; border-radius:14px; }
.sucesso{ background:#dcfce7; color:var(--success); padding:14px; border-radius:14px; }

/* LISTA */
#lista{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:26px;
}

.card{
    background:var(--card);
    padding:26px;
    border-radius:26px;
    box-shadow:0 14px 35px rgba(0,0,0,.15);
    transition:.25s;
}

.card:hover{
    transform:translateY(-4px);
}

.card h3{ 
    margin:0; 
    color:var(--primary-dark); 
    font-size:1.4rem;
}

.card p{ 
    margin:6px 0; 
    color:var(--muted); 
}

.card button{
    margin-top:12px;
    padding:12px;
    border-radius:14px;
    font-size:.95rem;
}

.card button:nth-of-type(1){ background:#1e8538; }
.card button:nth-of-type(2){ background:var(--danger); }
.card button:nth-of-type(3){ background:var(--warning); color:#1f2933; }

/* ===== RESPONSIVO ===== */
@media(max-width:900px){
    .header-box{
        flex-direction:column;
        text-align:center;
        padding:30px;
    }

    .logo{
        width:320px;
    }

    .header-text h1{
        font-size:2.8rem;
    }
}
</style>
</head>

<body>

<header>
    <div class="header-box">
        <img src="./manos.png" class="logo" alt="Pizzaria dos Manos">
        <div class="header-text">
            <h1>Pizzaria dos Manos</h1>
            <span>Sabor artesanal • Qualidade de verdade</span>
        </div>
    </div>
</header>

<div class="container">

    <div class="loading" id="loading" style="display:none">Carregando...</div>
    <div class="erro" id="erro"></div>
    <div class="sucesso" id="sucesso"></div>

    <form id="form">
        <input type="hidden" id="id">

        <input type="text" id="nome" placeholder="Nome da pizza" required>
        <input type="number" id="valor" placeholder="Valor (R$)" required>
        <input type="text" id="descricao" placeholder="Descrição" required>

        <select id="status">
            <option value="disponivel">Disponível</option>
            <option value="indisponivel">Indisponível</option>
            <option value="promocao">Promoção</option>
        </select>

        <button type="submit">Salvar</button>
    </form>

    <div id="lista"></div>
</div>

<script>
const API = "http://localhost:5000/pizzas";

const loading = document.getElementById("loading");
const erro = document.getElementById("erro");
const sucesso = document.getElementById("sucesso");
const lista = document.getElementById("lista");

const form = document.getElementById("form");
const idInput = document.getElementById("id");
const nomeInput = document.getElementById("nome");
const valorInput = document.getElementById("valor");
const descInput = document.getElementById("descricao");
const statusInput = document.getElementById("status");

async function listar(){
    loading.style.display="block";
    lista.innerHTML="";
    try{
        const res = await fetch(API);
        const dados = await res.json();
        dados.forEach(p=>{
            lista.innerHTML += `
            <div class="card">
                <h3>${p.nome}</h3>
                <p>${p.descricao}</p>
                <p>💰 R$ ${p.valor.toFixed(2)}</p>
                <p>Status: ${p.status}</p>
                <button onclick="editar(${p.id})">Editar</button>
                <button onclick="remover(${p.id})">Remover</button>
                <button onclick="mudarStatus(${p.id})">Mudar status</button>
            </div>`;
        });
    }catch{
        erro.innerText="Erro ao carregar pizzas";
    }
    loading.style.display="none";
}

listar();
</script>

</body>
</html>
